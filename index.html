<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Google Sans', 'Roboto', sans-serif;
    background: #f8f9fa;
    padding: 24px;
    color: #3c4043;
  }
  .section-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #80868b;
    margin-bottom: 14px;
  }
  .list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    padding: 12px 14px;
    text-decoration: none;
    transition: box-shadow 0.15s, border-color 0.15s;
  }
  .item:hover {
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    border-color: #bbb;
  }
  .icon {
    flex-shrink: 0;
    width: 32px;
    height: 32px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon svg { width: 16px; height: 16px; }
  .icon-blue { background: #e8f0fe; }
  .icon-green { background: #e6f4ea; }
  .icon-orange { background: #fce8e6; }
  .text { flex: 1; }
  .name {
    font-size: 13px;
    font-weight: 600;
    color: #1a73e8;
    margin-bottom: 2px;
    line-height: 1.3;
  }
  .desc {
    font-size: 11.5px;
    color: #80868b;
    line-height: 1.4;
  }
  .arrow {
    flex-shrink: 0;
    align-self: center;
    color: #bbb;
    font-size: 16px;
  }
</style>
</head>
